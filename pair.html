<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 CHATHUWA-XMD 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           PREMIUM NEON  (2026)
           ========================================== */
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06070d;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: #ffffff;
            padding: 20px;
        }

        /* Glassmorphism Card with Glowing Border Effect */
        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(13, 15, 28, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* Title Styling */
        h1.main-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        h2.sub-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Input Block Container */
        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .status-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
            padding-left: 4px;
        }

        /* Sleek Input Box */
        input.inner-box {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            padding: 16px;
            border-radius: 16px;
            background: rgba(5, 6, 12, 0.6);
            color: #ffffff;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input.inner-box:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            background: #05060c;
        }

        input::placeholder {
            color: #475569;
        }

        /* Futuristic Glowing Button */
        button.btn-action {
            width: 100%;
            border: none;
            outline: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.4);
            opacity: 0.95;
        }

        button.btn-action:active {
            transform: translateY(0);
        }

        /* Elegant Result Container */
        .result-container {
            margin-top: 25px;
            width: 100%;
            background: rgba(168, 85, 247, 0.04);
            border: 1px dashed rgba(168, 85, 247, 0.25);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        #codeBox {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            cursor: pointer;
        }

        /* Minimalist Footer */
        .footer-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .footer-text {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .footer-text span {
            color: #cbd5e1;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">👑 CHATHUWA-XMD 👑</h1>
    <h2 class="sub-title">Pair Code</h2>

    <div class="input-group">
        <label class="status-label">Type Your WhatsApp Number</label>
        <input type="text" id="number" class="inner-box" placeholder="94741336839">
    </div>

    <button class="btn-action" onclick="getCode()">Get Pair Code</button> 

    <div class="result-container" id="borderBox" style="display:none;">
        <div id="codeBox">----</div>
    </div>

    <div class="footer-section">
        <p class="footer-text">WHATSAPP BOT</p>
        <p class="footer-text">MADE BY <span>CHATHUWA</span></p>
        <p class="footer-text" style="margin-top: 10px; font-size: 0.65rem; opacity: 0.5;">CHATHUWA-XMD MINI BOT EDITION 2026</p>
    </div>
</div>

<script>
    async function getCode() {
        const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
        const codeBox = document.getElementById("codeBox");
        const borderBox = document.getElementById("borderBox");

        // Input empty validation
        if (!num) {
            borderBox.style.display = "block"; 
            codeBox.style.letterSpacing = "normal"; 
            codeBox.style.color = "#f43f5e"; // Premium Coral Red for errors
            codeBox.innerText = "APNA WHATSAPP NUMBER LIKHE";
            return;
        }

        // Loading State
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#6366f1"; 
        codeBox.innerText = "CONNECTING.....";

        try {
            const res = await fetch(`/code?number=${num}`);
            const data = await res.json();
            
            if (data.code) {
                codeBox.style.letterSpacing = "4px"; 
                codeBox.style.color = "#10b981"; // Emerald Green for success code
                codeBox.innerText = data.code;
            } else {
                codeBox.style.color = "#f43f5e";
                codeBox.innerText = "SERVER FULL";
            }
        } catch (e) {
            codeBox.style.color = "#f43f5e";
            codeBox.innerText = "SERVER IS FULL";
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        const display = document.getElementById('codeBox');
        const originalText = display.innerText;

        display.innerText = "COPIED";
        display.style.color = "#10b981";

        setTimeout(() => {
            display.innerText = originalText;
        }, 1500);
    }
</script>

</body>
</html>
