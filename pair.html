<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 CHATHUWA-XMD 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Modern Minimalist Premium UI Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1a1c29, #0e1017);
            color: #f3f4f6;
            padding: 20px;
        }

        /* Sleek Glassmorphism Card Design */
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(25, 28, 41, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Premium Brand Styling */
        h1.main-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        h2.sub-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #6366f1; /* Premium Indigo Accent */
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 12px;
            text-align: left;
            padding-left: 5px;
        }

        /* Container & Input Styling */
        .input-container {
            width: 100%;
            margin-bottom: 20px;
        }

        input.inner-box {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            padding: 16px;
            border-radius: 14px;
            background: rgba(10, 11, 18, 0.5);
            color: #ffffff;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        input.inner-box:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(10, 11, 18, 0.8);
        }

        input::placeholder {
            color: #4b5563;
        }

        /* Premium Accent Button */
        button.btn-action {
            width: 100%;
            border: none;
            outline: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: #6366f1;
            color: #ffffff;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button.btn-action:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        button.btn-action:active {
            transform: translateY(0);
        }

        /* Result Display Box */
        .result-container {
            margin-top: 20px;
            width: 100%;
            background: rgba(99, 102, 241, 0.06);
            border: 1px dashed rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            padding: 18px;
            transition: all 0.3s ease;
        }

        #codeBox {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ffffff;
            cursor: pointer;
            word-wrap: break-word;
        }

        /* Footer Info styling */
        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-tag {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .footer-tag span {
            color: #9ca3af;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">👑 CHATHUWA-XMD 👑</h1>
    <h2 class="sub-title">Pair Code</h2>

    <div class="input-container">
        <p class="status-text">Type Your WhatsApp Number</p>
        <input type="text" id="number" class="inner-box" placeholder="94741336839">
    </div>

    <button class="btn-action" onclick="getCode()">Get Pair Code</button> 

    <div class="result-container" id="borderBox" style="display:none;">
        <div id="codeBox">----</div>
    </div>

    <div class="footer-info">
        <p class="footer-tag">WHATSAPP BOT</p>
        <p class="footer-tag">MADE BY <span>CHATHUWA</span></p>
        <p class="footer-tag" style="margin-top: 8px; font-size: 0.7rem; opacity: 0.7;">CHATHUWA-XMD MINI BOT EDITION 2026</p>
    </div>
</div>

<script>
    async function getCode() {
        const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
        const codeBox = document.getElementById("codeBox");
        const borderBox = document.getElementById("borderBox");

        // Input empty validation
        if (!num) {
            borderBox.style.display = "block"; 
            codeBox.style.letterSpacing = "normal"; 
            codeBox.style.color = "#ef4444"; // Premium soft red for error
            codeBox.innerText = "PLEASE ENTER YOUR WHATSAPP NUMBER";
            return;
        }

        // Loading State
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#6366f1"; 
        codeBox.innerText = "CONNECTING.....";

        try {
            const res = await fetch(`/code?number=${num}`);
            const data = await res.json();
            
            if (data.code) {
                codeBox.style.letterSpacing = "4px"; 
                codeBox.style.color = "#10b981"; // Premium success green
                codeBox.innerText = data.code;
            } else {
                codeBox.style.color = "#ef4444";
                codeBox.innerText = "SERVER FULL";
            }
        } catch (e) {
            codeBox.style.color = "#ef4444";
            codeBox.innerText = "SERVER IS FULL";
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        const display = document.getElementById('codeBox');
        const originalText = display.innerText;

        display.innerText = "COPIED";
        display.style.color = "#10b981";

        setTimeout(() => {
            display.innerText = originalText;
        }, 1500);
    }
</script>

</body>
</html>
